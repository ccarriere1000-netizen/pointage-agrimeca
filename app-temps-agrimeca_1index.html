<title>Temps AGRIMECA</title>
<style>
  :root{
    --navy:#1e3a6f;--navy-deep:#142a52;--yellow:#fdc500;--yellow-soft:#ffe28a;
    --bg:#eef1f7;--card:#fff;--ink:#1c2536;--muted:#6b7689;--line:#e3e8f0;
    --ok:#2d8f5f;--danger:#c0392b;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--ink);font-size:16px;line-height:1.45;
    padding-bottom:env(safe-area-inset-bottom)}
  .wrap{max-width:560px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
  /* header */
  header{background:linear-gradient(120deg,var(--navy-deep),var(--navy));color:#fff;
    padding:calc(14px + env(safe-area-inset-top)) 18px 14px;display:flex;align-items:center;gap:12px;
    position:sticky;top:0;z-index:5;border-bottom:3px solid var(--yellow)}
  .mark{width:40px;height:40px;border-radius:9px;background:var(--yellow);display:flex;align-items:center;
    justify-content:center;font-weight:800;color:var(--navy-deep);font-size:17px;letter-spacing:-1px;flex-shrink:0}
  header .who{flex:1;min-width:0}
  header .who .t{font-size:12px;color:var(--yellow-soft);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
  header .who .n{font-size:18px;font-weight:800;line-height:1.1}
  .gear{background:rgba(255,255,255,.15);border:none;color:#fff;width:40px;height:40px;border-radius:9px;
    font-size:18px;cursor:pointer}
  /* identification */
  .pick{flex:1;display:flex;flex-direction:column;justify-content:center;padding:28px 22px;gap:14px}
  .pick h1{font-size:22px;color:var(--navy);margin:0 0 2px}
  .pick p{margin:0 0 14px;color:var(--muted)}
  .pickbtn{display:flex;align-items:center;gap:14px;background:var(--card);border:2px solid var(--line);
    border-radius:14px;padding:16px 18px;font-size:18px;font-weight:700;color:var(--ink);cursor:pointer;text-align:left}
  .pickbtn:active{border-color:var(--navy)}
  .pickbtn .code{margin-left:auto;background:var(--navy);color:#fff;font-size:13px;font-weight:800;
    padding:4px 10px;border-radius:8px;font-variant-numeric:tabular-nums}
  /* app body */
  .body{flex:1;padding:16px 14px 120px}
  .card{background:var(--card);border-radius:16px;box-shadow:0 1px 3px rgba(20,42,82,.07);padding:16px;margin-bottom:14px}
  .card h2{margin:0 0 14px;font-size:15px;color:var(--navy)}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;
    letter-spacing:.4px;margin-bottom:6px}
  input{font-family:inherit;font-size:17px;padding:13px 14px;border:1.5px solid var(--line);border-radius:11px;
    background:#fbfcfe;color:var(--ink);width:100%}
  input:focus{outline:none;border-color:var(--navy);background:#fff}
  .two{display:flex;gap:10px}.two>*{flex:1}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{border:1.5px solid var(--line);background:#fbfcfe;border-radius:20px;padding:9px 15px;font-size:15px;
    font-weight:700;color:var(--ink);cursor:pointer}
  .chip.on{background:var(--yellow);border-color:var(--yellow);color:var(--navy-deep)}
  .chip.add{color:var(--navy);border-style:dashed}
  .addbtn{width:100%;background:var(--ok);color:#fff;border:none;border-radius:13px;padding:16px;
    font-size:18px;font-weight:800;cursor:pointer;margin-top:4px}
  .addbtn:active{transform:translateY(1px)}
  /* tabs + list */
  .tabs{display:flex;gap:8px;margin-bottom:12px}
  .tab{flex:1;border:none;background:var(--card);color:var(--muted);padding:11px;border-radius:11px;
    font-size:15px;font-weight:700;cursor:pointer}
  .tab.on{background:var(--navy);color:#fff}
  .line{display:flex;align-items:center;gap:12px;padding:12px 4px;border-bottom:1px solid var(--line)}
  .line:last-child{border-bottom:none}
  .line .d{font-size:13px;color:var(--muted);font-variant-numeric:tabular-nums;width:48px;flex-shrink:0}
  .line .mid{flex:1;min-width:0}
  .line .bon{font-weight:700;font-variant-numeric:tabular-nums}
  .line .pr{display:inline-block;background:var(--yellow);color:var(--navy-deep);font-size:12px;font-weight:800;
    padding:1px 7px;border-radius:6px;margin-left:6px;letter-spacing:.4px}
  .line .note{font-size:12.5px;color:var(--muted);margin-top:3px;line-height:1.3}
  .noor{color:var(--danger);font-weight:700;font-size:13px}
  .line .h{font-weight:800;color:var(--navy);font-variant-numeric:tabular-nums;font-size:16px}
  .line .x{background:none;border:none;color:var(--danger);font-size:18px;cursor:pointer;opacity:.6;padding:4px}
  .empty{text-align:center;color:var(--muted);padding:26px 10px}
  .empty .big{font-size:30px;opacity:.5;margin-bottom:6px}
  .totrow{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:12px;
    border-top:2px solid var(--line);font-size:15px}
  .totrow b{color:var(--navy);font-size:20px;font-variant-numeric:tabular-nums}
  /* bottom bar */
  .bottom{position:fixed;left:0;right:0;bottom:0;z-index:6;background:rgba(255,255,255,.96);
    backdrop-filter:blur(8px);border-top:1px solid var(--line);
    padding:12px 14px calc(12px + env(safe-area-inset-bottom));max-width:560px;margin:0 auto}
  .send{width:100%;background:var(--navy);color:#fff;border:none;border-radius:13px;padding:16px;
    font-size:17px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
  .send:active{background:var(--navy-deep)}
  /* menu sheet */
  .sheet{position:fixed;inset:0;background:rgba(20,42,82,.45);z-index:20;display:none;align-items:flex-end}
  .sheet.show{display:flex}
  .sheetcard{background:#fff;width:100%;max-width:560px;margin:0 auto;border-radius:18px 18px 0 0;padding:10px 14px calc(18px + env(safe-area-inset-bottom))}
  .sheetcard .grab{width:40px;height:4px;border-radius:2px;background:var(--line);margin:8px auto 12px}
  .menuitem{display:block;width:100%;text-align:left;background:none;border:none;padding:15px 8px;font-size:16px;
    font-weight:600;color:var(--ink);border-bottom:1px solid var(--line);cursor:pointer}
  .menuitem.danger{color:var(--danger)}
  .menuitem:last-child{border-bottom:none}
  .hint{font-size:12px;color:var(--muted);text-align:center;margin-top:8px}
</style>
</head>
<body>
<div class="wrap">
  <!-- identification -->
  <div class="pick" id="pick">
    <h1>Qui es-tu ?</h1>
    <p>Choisis ton nom une fois — l'appli s'en souviendra.</p>
    <div id="pickBtns"></div>
  </div>

  <!-- code PIN -->
  <div class="pick" id="pinScreen" style="display:none">
    <h1 id="pinTitle">Code PIN</h1>
    <p>Saisis ton code à 4 chiffres.</p>
    <input id="pinInput" type="tel" inputmode="numeric" maxlength="4" placeholder="••••"
      style="font-size:28px;text-align:center;letter-spacing:10px;max-width:200px">
    <div id="pinErr" style="color:var(--danger);font-weight:600;min-height:20px;font-size:14px"></div>
    <button class="addbtn" id="pinOk" style="max-width:220px">Valider</button>
    <button id="pinBack" style="background:none;border:none;color:var(--muted);font-size:15px;padding:8px;cursor:pointer">← Changer de nom</button>
  </div>

  <!-- app -->
  <header id="appHeader" style="display:none">
    <div class="mark">AM</div>
    <div class="who"><div class="t">Mes temps · AGRIMECA</div><div class="n" id="meName"></div></div>
    <button class="gear" id="gearBtn" aria-label="Menu">⚙</button>
  </header>

  <div class="body" id="appBody" style="display:none">
    <div class="card" id="entryCard">
      <h2>Nouveau pointage</h2>
      <div class="two">
        <div class="field"><label>Date</label><input type="date" id="fDate"></div>
        <div class="field"><label>N° d'OR</label><input id="fBon" inputmode="numeric" placeholder="1234"></div>
      </div>
      <div class="field"><label>Prestation</label><div class="chips" id="prChips"></div></div>
      <div class="two">
        <div class="field"><label>Heure de début</label><input type="time" id="fStart"></div>
        <div class="field"><label>Heure de fin</label><input type="time" id="fEnd"></div>
      </div>
      <div class="field"><label>Précision <span style="text-transform:none;font-weight:500">(si pas de N° d'OR)</span></label><input id="fNote" placeholder="ex. client Durand, tracteur, fuite hydraulique"></div>
      <button class="addbtn" id="addBtn">+ Ajouter le pointage</button>
    </div>

    <div class="tabs">
      <button class="tab on" id="tabDay">Aujourd'hui</button>
      <button class="tab" id="tabDate">Autre jour</button>
      <button class="tab" id="tabHS">Heures sup</button>
    </div>
    <div class="card" id="listCard">
      <div class="field" id="viewDateWrap" style="display:none"><label>Voir le jour</label><input type="date" id="viewDate"></div>
      <div id="listBox"></div>
      <div class="totrow"><span id="totLabel">Total du jour</span><b id="totVal">00:00</b></div>
    </div>
    <div class="card" id="hsCard" style="display:none">
      <h2>Heures sup à ce jour</h2>
      <div id="hsBox"></div>
    </div>
  </div>

  <!-- bottom -->
  <div class="bottom" id="bottom" style="display:none">
    <button class="send" id="sendBtn">📤 Transmettre mes temps</button>
    <div class="hint" id="sendHint">Synchro à jour</div>
  </div>
</div>

<!-- menu -->
<div class="sheet" id="sheet">
  <div class="sheetcard">
    <div class="grab"></div>
    <button class="menuitem" id="miTest">🔌 Tester la connexion à la base</button>
    <button class="menuitem" id="miSync">🔄 Synchroniser maintenant</button>
    <button class="menuitem" id="miUrl">🔧 Régler l'URL de la base</button>
    <button class="menuitem" id="miClose">Fermer</button>
  </div>
</div>

<script>
"use strict";

var DEFAULT_URL="https://script.google.com/macros/s/AKfycbyYgWr5OcSaQWPEyDnbLvPTSSLawBN4rfYHMqGu6CCTHQmXCNL6VEHKvHLWMa1ycz24pA/exec";
var API_URL=DEFAULT_URL;
try{var _u=localStorage.getItem(K_URL); if(_u)API_URL=_u;}catch(e){}
var $=function(id){return document.getElementById(id);};
var SALS=[{c:"010",n:"Maxime"},{c:"006",n:"Thomas"},{c:"007",n:"Clément"},{c:"019",n:"Benoît"},{c:"013",n:"Corentin"}];
var K_ME="agrimeca_app_me", K_ROWS="agrimeca_app_rows";
var me=null, tentative=null, rows=[], curPresta=null, view="day", selectedDate="";
var prestas=["MO","TPS de RTE","FLEXIBLE","CONGES-Récup/HRS"];
var THRESHOLDS={"010":35,"019":35,"013":35,"007":39}; // base h/sem · Thomas 006 = gérant, sans base
try{me=JSON.parse(localStorage.getItem(K_ME));}catch(e){}
try{rows=JSON.parse(localStorage.getItem(K_ROWS))||[];}catch(e){rows=[];}
rows.forEach(function(r){if(!r.cid)r.cid=uuid();if(!r.statut)r.statut="Brouillon";if(!r.sync)r.sync="pending";if(r.sid===undefined)r.sid=null;});

/* helpers format */
function clk(mn){return String(Math.floor(mn/60)).padStart(2,"0")+":"+String(mn%60).padStart(2,"0");}
function mins(hhmm){var p=hhmm.split(":");return (+p[0])*60+(+p[1]);}
function tempsHHMM(v){
  var s=String(v||"").trim().toLowerCase().replace(/\s/g,""),m;
  if(!s)return null;
  if(m=s.match(/^(\d{1,2}):(\d{2})$/))return clk((+m[1])*60+(+m[2]));
  if(m=s.match(/^(\d+)h(\d{0,2})$/))return clk((+m[1])*60+(m[2]?+m[2]:0));
  if(m=s.match(/^(\d+)(?:min|m)$/))return clk(+m[1]);
  if(m=s.match(/^(\d+[.,]\d+)h$/))return clk(Math.round(parseFloat(m[1].replace(",","."))*60));
  if(m=s.match(/^(\d+[.,]?\d*)$/))return clk(Math.round(parseFloat(m[1].replace(",","."))*60));
  return null;
}
function dateJJMMAA(iso){if(!iso)return"";var p=iso.split("-");return p[2]+"/"+p[1]+"/"+p[0].slice(2);}
function todayISO(){return new Date().toISOString().slice(0,10);}
function norm(v){return (v||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").toUpperCase().trim();}
function esc(v){return String(v||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function saveRows(){try{localStorage.setItem(K_ROWS,JSON.stringify(rows));}catch(e){}}
function uuid(){return "c"+Date.now().toString(36)+Math.random().toString(36).slice(2,8);}
function jjmmaaToISO(s){var p=String(s||"").split("/");if(p.length<3)return "";return "20"+p[2]+"-"+("0"+p[1]).slice(-2)+"-"+("0"+p[0]).slice(-2);}
function api(payload){
  return new Promise(function(resolve,reject){
    var cb="cb"+Date.now()+Math.floor(Math.random()*1e4);
    var data=btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
    var s=document.createElement("script");
    var timer=setTimeout(function(){clean();reject(new Error("timeout"));},20000);
    function clean(){clearTimeout(timer);try{delete window[cb];}catch(e){window[cb]=undefined;}if(s.parentNode)s.parentNode.removeChild(s);}
    window[cb]=function(res){clean();resolve(res);};
    s.onerror=function(){clean();reject(new Error("réseau"));};
    s.src=API_URL+"?callback="+cb+"&data="+encodeURIComponent(data);
    document.body.appendChild(s);
  });
}

/* identification */
function renderPick(){
  $("pickBtns").innerHTML="";
  SALS.forEach(function(s){
    var b=document.createElement("button");b.className="pickbtn";
    b.innerHTML=s.n+'<span class="code">'+s.c+'</span>';
    b.onclick=function(){askPin(s);};
    $("pickBtns").appendChild(b);
  });
}
function showPick(){
  $("pick").style.display="flex";$("pinScreen").style.display="none";
  $("appHeader").style.display="none";$("appBody").style.display="none";$("bottom").style.display="none";
  renderPick();
}
function askPin(s){
  tentative=s;
  $("pick").style.display="none";$("pinScreen").style.display="flex";
  $("pinTitle").textContent="Code PIN — "+s.n;
  $("pinInput").value="";$("pinErr").textContent="";
  setTimeout(function(){$("pinInput").focus();},100);
}
function validatePin(){
  var pin=$("pinInput").value.trim();
  if(pin.length<4){$("pinErr").textContent="4 chiffres attendus.";return;}
  $("pinErr").textContent="Vérification…";
  api({action:"list",code:tentative.c,pin:pin}).then(function(res){
    if(res&&res.ok){
      me={c:tentative.c,n:tentative.n,pin:pin};
      localStorage.setItem(K_ME,JSON.stringify(me));
      if(res.rows)mergeServer(res.rows);
      showApp();
    }else{$("pinErr").textContent=(res&&res.err)||"PIN incorrect.";}
  }).catch(function(){$("pinErr").textContent="Pas de connexion. Réessaie.";});

function showApp(){
  $("pick").style.display="none";$("pinScreen").style.display="none";
  $("appHeader").style.display="flex";$("appBody").style.display="block";$("bottom").style.display="block";
  $("meName").textContent=me.n+" · "+me.c;
  $("fDate").value=todayISO();
  renderChips();refresh();
  syncPending().then(pull);
}

/* prestations chips */
function renderChips(){
  var box=$("prChips");box.innerHTML="";
  prestas.forEach(function(p){
    var b=document.createElement("button");b.className="chip"+(p===curPresta?" on":"");

/* ajout */
function add(){
  if(!curPresta){alert("Choisis une prestation.");return;}
  var deb=$("fStart").value, fin=$("fEnd").value;
  if(!deb||!fin){alert("Indique l'heure de début et de fin.");return;}
  var d=mins(deb), f=mins(fin);
  if(f<=d){alert("L'heure de fin doit être après l'heure de début.");return;}
  var t=clk(f-d);
  var note=$("fNote").value.replace(/[;\r\n]+/g," ").trim();
  var row={cid:uuid(),sid:null,iso:$("fDate").value||todayISO(),bon:$("fBon").value.trim(),
    hhmm:t,presta:curPresta,note:note,deb:deb,fin:fin,statut:"Brouillon",sync:"pending"};
  rows.push(row);saveRows();
  $("fBon").value="";$("fStart").value="";$("fEnd").value="";$("fNote").value="";curPresta=null;
  renderChips();refresh();$("fBon").focus();
  syncRow(row).then(refresh);
}

/* liste */
function visibleRows(){
  var idx=rows.map(function(r,i){return Object.assign({i:i},r);});
  var target=(view==="day")?todayISO():selectedDate;
  idx=idx.filter(function(r){return r.iso===target;});
  idx.sort(function(a,b){return (a.deb||"")<(b.deb||"")?-1:((a.deb||"")>(b.deb||"")?1:0);});
  return idx;
}
function renderList(){
  var vis=visibleRows(),box=$("listBox");
  if(!vis.length){box.innerHTML='<div class="empty"><div class="big">🗒️</div>'+
    (view==="day"?"Rien saisi aujourd'hui.":"Rien saisi ce jour-là.")+'</div>';}
  else{
    box.innerHTML=vis.map(function(r){
      var locked=(r.statut&&r.statut!=="Brouillon");
      var badge=locked?'<span title="Transmis — verrouillé" style="color:var(--muted);font-size:16px;padding:4px">🔒</span>'
                      :'<button class="x" data-c="'+r.cid+'">🗑</button>';
      return '<div class="line"><div class="d">'+dateJJMMAA(r.iso)+'</div>'+
        '<div class="mid"><span class="bon">'+(r.bon?esc(r.bon):'<span class="noor">sans N° d\'OR</span>')+'</span>'+
        (r.presta?'<span class="pr">'+esc(r.presta)+'</span>':'')+
        (locked?'<span class="pr" style="background:#e0e6f1;color:var(--navy)">'+esc(r.statut)+'</span>':'')+
        (r.sync==="pending"?'<span class="pr" style="background:#fff3cd;color:#7a5b00">⏳ à synchro</span>':'')+
        (r.deb&&r.fin?'<div class="note">⏱ '+r.deb+' → '+r.fin+'</div>':'')+
        (r.note?'<div class="note">📝 '+esc(r.note)+'</div>':'')+'</div>'+
        '<div class="h">'+r.hhmm+'</div>'+badge+'</div>';
    }).join("");
    box.querySelectorAll(".x").forEach(function(b){b.onclick=function(){delRow(b.dataset.c);};});
  }
  var tot=vis.reduce(function(s,r){return s+mins(r.hhmm);},0);
  $("totLabel").textContent=(view==="day")?"Total du jour":("Total du "+(selectedDate?dateJJMMAA(selectedDate):"…"));
  $("totVal").textContent=clk(tot);
}
function setTab(v){
  view=v;
  $("tabDay").classList.toggle("on",v==="day");
  $("tabDate").classList.toggle("on",v==="date");
  $("tabHS").classList.toggle("on",v==="hs");
  var hs=(v==="hs");
  $("entryCard").style.display=hs?"none":"block";
  $("listCard").style.display=hs?"none":"block";
  $("hsCard").style.display=hs?"block":"none";

$("tabDay").onclick=function(){setTab("day");};
$("tabDate").onclick=function(){
  if(!$("viewDate").value)$("viewDate").value=todayISO();
  selectedDate=$("viewDate").value;setTab("date");
};
$("tabHS").onclick=function(){setTab("hs");};
$("viewDate").addEventListener("change",function(){selectedDate=$("viewDate").value||todayISO();renderList();});

/* ---- heures sup ---- */
function signed(mn){return (mn<0?"-":"+")+clk(Math.abs(mn));}
function getMondayISO(iso){
  var d=new Date(iso+"T00:00:00");
  var off=(d.getDay()+6)%7; d.setDate(d.getDate()-off);
  return d.toISOString().slice(0,10);
}
function renderHS(){
  var base=THRESHOLDS[me.c];
  if(!base){$("hsBox").innerHTML='<div class="empty"><div class="big">—</div>Pas de décompte d\'heures sup pour ce poste (gérant).</div>';return;}
  var baseMin=base*60, weeks={}, recupTot=0;
  rows.forEach(function(r){
    var wk=getMondayISO(r.iso);
    if(!weeks[wk])weeks[wk]={worked:0,recup:0};
    var mn=mins(r.hhmm);
    if(r.presta==="CONGES-Récup/HRS"){weeks[wk].recup+=mn;recupTot+=mn;} else weeks[wk].worked+=mn;
  });
  var keys=Object.keys(weeks).sort().reverse(), gross=0;
  keys.forEach(function(k){gross+=Math.max(0,weeks[k].worked-baseMin);});
  var major=Math.round(gross/4), majored=gross+major; // +15 min / h
  var html='<div style="text-align:center;padding:4px 0 16px">'+
    '<div style="font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">Solde heures sup (si récupérées)</div>'+
    '<div style="font-size:42px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--navy)">'+clk(majored)+'</div>'+
    '<div style="font-size:13px;color:var(--muted)">base '+base+' h/sem · majoration +15 min/h</div></div>';
  if(!keys.length){$("hsBox").innerHTML=html+'<div class="empty"><div class="big">⏱️</div>Aucune heure enregistrée.</div>';return;}
  html+=keys.map(function(k){
    var w=weeks[k], sup=Math.max(0,w.worked-baseMin);
    return '<div class="line"><div class="mid">'+
      '<span class="bon">Sem. du '+dateJJMMAA(k)+'</span>'+
      '<div class="note">Travaillé '+clk(w.worked)+' · base '+clk(baseMin)+'</div>'+
      (w.recup?'<div class="note">↩ congé/récup saisi '+clk(w.recup)+' (à classer)</div>':'')+
      '</div><div class="h" style="color:'+(sup>0?'var(--ok)':'var(--muted)')+'">'+(sup>0?'+'+clk(sup):'—')+'</div></div>';
  }).join("");
  html+='<div style="margin-top:12px;padding-top:12px;border-top:2px solid var(--line);font-size:14px">'+
    '<div style="display:flex;justify-content:space-between;padding:3px 0"><span>Heures sup brut</span><b style="font-variant-numeric:tabular-nums">'+clk(gross)+'</b></div>'+
    '<div style="display:flex;justify-content:space-between;padding:3px 0"><span>+ majoration 15 min/h</span><b style="font-variant-numeric:tabular-nums">+'+clk(major)+'</b></div>'+
    '<div style="display:flex;justify-content:space-between;padding:3px 0;color:var(--navy);font-weight:700"><span>= Si récupérées</span><b style="font-variant-numeric:tabular-nums">'+clk(majored)+'</b></div>'+
    (recupTot?'<div style="display:flex;justify-content:space-between;padding:3px 0;color:var(--muted)"><span>Congé/récup saisi (à classer)</span><b style="font-variant-numeric:tabular-nums">'+clk(recupTot)+'</b></div>':'')+
  '</div>';
  html+='<div class="hint" style="margin-top:8px">Récupérées : +15 min/h. Payées sur salaire : sans majoration, déduites par l\'admin.</div>';
  $("hsBox").innerHTML=html;
}

/* ---- synchro base centrale ---- */
var lastErr="";
function refresh(){ if(view==="hs")renderHS(); else renderList(); updateSyncStatus(); }
function pendingCount(){return rows.filter(function(r){return r.sync==="pending";}).length;}
function updateSyncStatus(){
  var p=pendingCount();
  if(p){$("sendHint").textContent="⏳ "+p+" à synchroniser"+(lastErr?" — "+lastErr:"");}
  else{$("sendHint").textContent=lastErr?("⚠ "+lastErr):"Synchro à jour";}
}
function mergeServer(srv){
  var byId={}; rows.forEach(function(r){if(r.sid)byId[r.sid]=r;});
  srv.forEach(function(sr){
    var loc=byId[String(sr.id)];
    if(loc){loc.statut=sr.statut;}
    else{rows.push({cid:uuid(),sid:String(sr.id),iso:jjmmaaToISO(sr.date),bon:String(sr.or||""),
      deb:sr.debut||"",fin:sr.fin||"",hhmm:sr.duree||"00:00",presta:sr.presta||"",note:sr.note||"",
      statut:sr.statut||"Brouillon",sync:"ok"});}
  });
  saveRows();
}
function syncRow(row){
  if(row.statut&&row.statut!=="Brouillon")return Promise.resolve();
  var payload={action:"save",code:me.c,pin:me.pin,row:{
    id:row.sid||"",date:dateJJMMAA(row.iso),or:row.bon,debut:row.deb,fin:row.fin,
    duree:row.hhmm,presta:row.presta,note:row.note}};
  return api(payload).then(function(res){
    if(res&&res.ok){row.sid=res.id;row.statut=res.statut||"Brouillon";row.sync="ok";lastErr="";saveRows();}
    else{row.sync="pending";lastErr=(res&&res.err)||"réponse serveur invalide";}
  }).catch(function(e){row.sync="pending";lastErr=(e&&e.message==="timeout")?"pas de réponse (accès base ?)":"hors-ligne";});
}
function syncPending(){
  var pend=rows.filter(function(r){return r.sync!=="ok"&&(!r.statut||r.statut==="Brouillon");});
  return pend.reduce(function(p,r){return p.then(function(){return syncRow(r);});},Promise.resolve())
    .then(function(){saveRows();refresh();});
}
function pull(){
  if(!me)return Promise.resolve();
  return api({action:"list",code:me.c,pin:me.pin}).then(function(res){
    if(res&&res.ok&&res.rows){mergeServer(res.rows);refresh();}
  }).catch(function(){});
}
function delRow(cid){
  var i=-1;for(var k=0;k<rows.length;k++){if(rows[k].cid===cid){i=k;break;}}
  if(i<0)return;
  var r=rows[i];
  if(r.statut&&r.statut!=="Brouillon"){alert("Ligne transmise — verrouillée. Demande à l'admin pour la rouvrir.");return;}
  if(!confirm("Supprimer cette ligne ?"))return;
  if(r.sid){api({action:"delete",code:me.c,pin:me.pin,id:r.sid}).catch(function(){});}
  rows.splice(i,1);saveRows();refresh();
}
function transmettre(){
  var target=(view==="date"&&selectedDate)?selectedDate:todayISO();
  var dayRows=rows.filter(function(r){return r.iso===target&&(!r.statut||r.statut==="Brouillon");});
  if(!dayRows.length){alert("Aucune ligne à transmettre pour le "+dateJJMMAA(target)+".");return;}
  if(!confirm("Transmettre les "+dayRows.length+" ligne(s) du "+dateJJMMAA(target)+" ?\nElles seront verrouillées (modification soumise à l'admin)."))return;
  $("sendHint").textContent="Transmission…";
  dayRows.reduce(function(p,r){return p.then(function(){return syncRow(r);});},Promise.resolve())
  .then(function(){
    var ids=dayRows.map(function(r){return r.sid;}).filter(Boolean);
    if(!ids.length)throw new Error("nosync");
    return api({action:"transmettre",code:me.c,pin:me.pin,ids:ids});
  }).then(function(res){
    if(res&&res.ok&&res.transmis>0){
      dayRows.forEach(function(r){r.statut="Transmis";r.sync="ok";});
      saveRows();refresh();
      alert(res.transmis+" ligne(s) du "+dateJJMMAA(target)+" transmise(s) et verrouillée(s).");
      pull();
    }else if(res&&res.ok){
      alert("Aucune ligne n'a été transmise (déjà transmises, ou code non reconnu). Rien n'a été verrouillé.");
      pull();
    }else{alert("Échec : "+((res&&res.err)||"réseau")+". Réessaie.");}
  }).catch(function(e){
    alert(e&&e.message==="nosync"
      ? "Ces lignes ne sont pas encore enregistrées sur la base (réseau ?). Réessaie une fois connecté."
      : "Pas de connexion — réessaie avec du réseau.");
  }).then(function(){updateSyncStatus();});
}
$("addBtn").onclick=add;
$("sendBtn").onclick=transmettre;
$("pinOk").onclick=validatePin;
$("pinInput").addEventListener("keydown",function(e){if(e.key==="Enter")validatePin();});
$("pinBack").onclick=showPick;
$("fBon").addEventListener("keydown",function(e){if(e.key==="Enter")$("fStart").focus();});
$("fEnd").addEventListener("keydown",function(e){if(e.key==="Enter")add();});

/* menu */
function sheet(o){$("sheet").classList.toggle("show",o);}
$("gearBtn").onclick=function(){sheet(true);};
$("sheet").onclick=function(e){if(e.target===$("sheet"))sheet(false);};
$("miClose").onclick=function(){sheet(false);};
$("miTest").onclick=function(){sheet(false);
  $("sendHint").textContent="Test connexion…";
  api({action:"diag"}).then(function(res){
    if(res&&res.ok){
      alert("Base reliée à l'app :\n\n• Classeur : "+res.classeur+
        "\n• Lignes dans « Pointages » : "+res.lignesPointages+
        "\n• Onglets : "+((res.onglets||[]).join(", "))+
        "\n\n👉 Ouvre CE classeur :\n"+res.url);
    }else{alert("Réponse inattendue : "+JSON.stringify(res));}
  }).catch(function(e){
    alert("Connexion échouée ❌\nDétail : "+((e&&e.message)||"inconnu"));
  }).then(updateSyncStatus);
};
$("miSync").onclick=function(){sheet(false);syncPending().then(pull);};
$("miUrl").onclick=function(){sheet(false);
  var u=prompt("Colle l'URL de la base (celle qui finit par /exec) :", API_URL);
  if(u){u=u.trim();try{localStorage.setItem(K_URL,u);}catch(e){}API_URL=u;
    alert("URL enregistrée ✅\nFais maintenant « Tester la connexion ».");}
};

/* go */
if(me&&me.c&&me.pin)showApp();else showPick();
